version: '3.8'

services:
  db:
    image: mysql:8.0
    container_name: gestion_horaires_db
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: Mouss@2006
      MYSQL_DATABASE: gestion_horaires
    ports:
      - "3307:3306"
    volumes:
      - ./docker/init.sql:/docker-entrypoint-initdb.d/init.sql
      - db_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-pMouss@2006"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build: ./backend
    container_name: gestion_horaires_backend
    restart: always
    ports:
      - "5000:5000"
    environment:
      - PORT=5000
      - DB_HOST=db
      - DB_USER=root
      - DB_PASSWORD=Mouss@2006
      - DB_NAME=gestion_horaires
      - JWT_SECRET=monsecretjwt
    depends_on:
      db:
        condition: service_healthy

  frontend:
    build: ./frontend
    container_name: gestion_horaires_frontend
    restart: always
    ports:
      - "3000:80"
    depends_on:
      - backend

volumes:
  db_data: